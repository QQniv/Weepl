<!doctype html>
<html lang="ru">
<head>
  <link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/animations.css">
<link rel="stylesheet" href="styles/responsive.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>To-Do List • Сегодня</title>
  <meta name="theme-color" content="#ffffff" />
  <!-- Подключаем внешний файл стилей -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- Appbar -->
  <div class="appbar">
    <div class="bar">
      <div class="brand">To-Do</div>
      <div class="spacer"></div>
      <button class="btn">🔔 Напоминания</button>
      <button class="btn btn-accent" id="btnToday">Сегодня</button>
    </div>
  </div>

  <div class="wrap">
    <h1 id="titleDay">Сегодня</h1>

    <!-- Month / arrows -->
    <div class="monthbar">
      <div class="chev" id="prevWeek">←</div>
      <div id="monthLabel">Июнь</div>
      <div class="chev" id="nextWeek">→</div>
    </div>

    <!-- Days scroller -->
    <div class="days" id="daysStrip" aria-label="Выбор дня">
      <!-- Пилюли рендерятся скриптом -->
    </div>

    <!-- Timeline list -->
    <div class="timeline" id="timeline">
      <!-- Рендерится скриптом -->
    </div>

    <div class="empty" id="emptyState" style="display:none">
      На этот день задач нет. Нажми «+», чтобы добавить.
    </div>

    <div class="footer-pad"></div>
  </div>

  <!-- FAB -->
  <div class="fab"><button id="addBtn">＋</button></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="backdrop" data-close></div>
    <div class="sheet">
      <h3>Новое дело</h3>
      <div class="rowf">
        <div class="field">
          <label>Название</label>
          <input id="fTitle" placeholder="Купить продукты" />
        </div>
      </div>
      <div class="rowf">
        <div class="field">
          <label>Дата</label>
          <input id="fDate" type="date" />
        </div>
        <div class="field">
          <label>Время</label>
          <input id="fTime" type="time" />
        </div>
        <div class="field">
          <label>Длительность (мин.)</label>
          <input id="fDur" type="number" min="5" step="5" value="60" />
        </div>
      </div>
      <div class="rowf">
        <div class="field">
          <label>Тип</label>
          <select id="fType">
            <option value="work">Работа</option>
            <option value="study">Учёба</option>
            <option value="life">Личное</option>
          </select>
        </div>
        <div class="field">
          <label>Метки</label>
          <input id="fTags" placeholder="важно, дедлайн" />
        </div>
      </div>
      <div class="field">
        <label>Заметка</label>
        <textarea id="fNote" rows="3"></textarea>
      </div>
      <div class="actionsheet">
        <button class="btn" data-close>Отмена</button>
        <button class="btn btn-accent" id="saveEvent">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Подключаем основной скрипт -->
  <script src="js/main.js"></script>
</body>
</html>
