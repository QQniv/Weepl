<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weepl • Планер дел</title>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Стили -->
  <link rel="stylesheet" href="./styles.css?v=1005">
</head>

<body>
  <div id="app" class="app"></div>

  <!-- Layout -->
  <template id="layout">
    <header class="topbar">
      <nav class="tabs">
        <a href="#/" class="tab" data-route="#/"><span>📋</span> Задачи</a>
        <a href="#/calendar" class="tab" data-route="#/calendar"><span>📅</span> Календарь</a>
        <a href="#/settings" class="tab" data-route="#/settings"><span>⚙️</span> Настройки</a>
      </nav>
    </header>
    <main id="view" class="view" tabindex="-1"></main>
    <button id="fabAdd" class="fab">+</button>
  </template>

  <!-- Home -->
  <template id="home-view">
    <section class="section">
      <div class="month-bar">
        <button id="prevMonth">←</button>
        <h1 id="homeMonth" class="h-impact"></h1>
        <button id="nextMonth">→</button>
      </div>
      <div id="dateStrip" class="date-strip"></div>
      <h2 id="todayTitle" class="h2">Сегодня</h2>
      <div id="taskList" class="task-list"></div>
    </section>
  </template>

  <!-- Calendar -->
  <template id="calendar-view">
    <section class="section">
      <h1>Календарь</h1>
      <p>Здесь будет календарь позже.</p>
    </section>
  </template>

  <!-- Settings -->
  <template id="settings-view">
    <section class="section">
      <h1>Настройки</h1>
      <p>Темы, цвета и всё остальное скоро добавим.</p>
    </section>
  </template>

  <!-- JS -->
  <script src="./app.js?v=1005"></script>
</body>
</html>
