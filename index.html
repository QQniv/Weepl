<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Weepl • Планировщик будущего</title>
  <link rel="stylesheet" href="styles.css"/>
  <script defer src="app.js"></script>
</head>
<body>
  <div id="app"></div>

  <!-- ====== TEMPLATE: LAYOUT ====== -->
  <template id="layout">
    <nav class="topbar">
      <div class="tabs">
        <div class="tab active" data-route="#/"><span class="icon">📋</span>Задачи</div>
        <div class="tab" data-route="#/calendar"><span class="icon">📅</span>Календарь</div>
        <div class="tab" data-route="#/settings"><span class="icon">⚙️</span>Настройки</div>
      </div>
    </nav>
    <main id="view" class="section"></main>
    <button id="fabAdd" class="fab">+</button>
  </template>

  <!-- ====== HOME VIEW ====== -->
  <template id="home-view">
    <section class="home">
      <div class="month-bar">
        <button class="month-btn" data-home-month="prev">←</button>
        <h2 id="homeMonth" class="h-impact"></h2>
        <button class="month-btn" data-home-month="next">→</button>
      </div>

      <div id="dateStrip" class="date-strip"></div>

      <h3 id="todayTitle" class="h-sub"></h3>
      <div id="taskList" class="task-list"></div>
    </section>
  </template>

  <!-- ====== CALENDAR VIEW ====== -->
  <template id="calendar-view">
    <section>
      <div class="calendar-head">
        <button class="month-btn" data-cal="prev">←</button>
        <h2 id="calTitle" class="h-impact"></h2>
        <button class="month-btn" data-cal="next">→</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div id="calendarTasks" class="calendar-tasks"></div>
    </section>
  </template>

  <!-- ====== SETTINGS VIEW ====== -->
  <template id="settings-view">
    <section>
      <div class="settings-card">
        <div class="row"><label>Тема</label>
          <select id="setTheme">
            <option value="light">Светлая</option>
            <option value="dark">Тёмная</option>
          </select>
        </div>
        <div class="row"><label>Акцент</label>
          <select id="setAccent">
            <option value="blue">Синий</option>
            <option value="rose">Розовый</option>
            <option value="violet">Фиолетовый</option>
            <option value="mint">Мятный</option>
            <option value="lemon">Жёлтый</option>
            <option value="coral">Коралловый</option>
            <option value="azure">Голубой</option>
            <option value="orchid">Орхидея</option>
            <option value="sky">Небесный</option>
            <option value="lime">Лайм</option>
          </select>
        </div>
        <div class="row">
          <button class="btn" id="btnExport">Экспорт</button>
          <label class="btn-outline">Импорт <input type="file" id="fileImport" hidden/></label>
        </div>
      </div>
    </section>
  </template>

  <!-- ====== MODAL ADD/EDIT ====== -->
  <dialog id="taskModal" class="modal">
    <form id="taskForm" method="dialog">
      <div class="modal-body">
        <div class="modal-head">
          <h3 id="modalTitle" class="h-impact">Новая задача</h3>
          <button data-close class="icon-btn">✖</button>
        </div>
        <div class="field">
          <label>Название</label>
          <input name="title" id="fTitle" required/>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Дата</label>
            <input type="date" name="date" id="fDate"/>
          </div>
          <div class="field">
            <label>Время</label>
            <input type="time" name="time" id="fTime"/>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Важность</label>
            <select name="priority" id="fPriority">
              <option value="low">Низкая</option>
              <option value="medium">Средняя</option>
              <option value="high">Высокая</option>
              <option value="critical">Критическая</option>
            </select>
          </div>
          <div class="field">
            <label>SMART</label>
            <input name="smart" id="fSmart" placeholder="Например: измеримо, достижимо..."/>
          </div>
        </div>
        <div class="field">
          <label>Комментарий</label>
          <textarea name="note" id="fNote" rows="2"></textarea>
        </div>
        <div class="modal-foot">
          <button data-close class="btn-outline">Отмена</button>
          <button type="submit" class="btn">Сохранить</button>
        </div>
      </div>
    </form>
  </dialog>
</body>
</html>
