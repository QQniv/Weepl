<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Weepl • Планировщик</title>

  <!-- Шрифты: Anton для заголовков, Inter для текста -->
  <link href="https://fonts.googleapis.com/css2?family=Anton:wght@400&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Стили -->
  <link rel="stylesheet" href="styles.css?v=1.6.3" />
  <meta name="theme-color" content="#ffffff" />
</head>
<body>

  <!-- Верхняя панель месяца -->
  <header class="topbar">
    <button id="navPrev" class="icon-btn" aria-label="Предыдущий месяц">←</button>
    <h1 id="topTitle" class="title">Октябрь 2025 г.</h1>
    <button id="navNext" class="icon-btn" aria-label="Следующий месяц">→</button>
  </header>

  <!-- Горизонтальный барабан дат (главный экран) -->
  <section id="dateScroller" class="date-scroller" aria-label="Дни месяца">
    <!-- app.js заполнит карточками дат -->
  </section>

  <!-- Главная: временная шкала и список задач/событий -->
  <main id="todayView" class="view active" aria-label="Сегодня">
    <section class="timeline-wrap">
      <div id="timeline" class="timeline" aria-label="Временная шкала">
        <!-- app.js рисует часы и события -->
      </div>
    </section>

    <section class="tasks-card">
      <div class="tasks-card__head">
        <h2 class="section-title">Задачи</h2>
        <span id="kpiCounter" class="kpi">0/0</span>
      </div>
      <ul id="taskList" class="task-list" aria-live="polite">
        <!-- app.js добавляет задачи -->
      </ul>
    </section>
  </main>

  <!-- Календарь (отдельная вкладка) -->
  <main id="calendarView" class="view" aria-label="Календарь">
    <header class="subbar">
      <button id="calPrev" class="icon-btn" aria-label="Предыдущий месяц">←</button>
      <h2 id="calTitle" class="subtitle">Октябрь 2025 г.</h2>
      <button id="calNext" class="icon-btn" aria-label="Следующий месяц">→</button>
    </header>
    <div id="calendarGrid" class="calendar-grid" role="grid" aria-label="Сетка календаря">
      <!-- app.js заполнит днями 1–31 -->
    </div>
  </main>

  <!-- Статистика -->
  <main id="statsView" class="view" aria-label="Статистика">
    <h2 class="section-title">Статистика</h2>
    <div class="stats-grid">
      <div class="card kpi-ring">
        <canvas id="ringPct" width="240" height="240" aria-label="Процент недели"></canvas>
        <div id="ringPctValue" class="ring-value">0%</div>
        <div class="muted">Выполнено за неделю</div>
      </div>
      <div class="card kpi-box"><div id="kpi7d" class="kpi-big">0 / 0</div><div class="muted">За 7 дней</div></div>
      <div class="card kpi-box"><div id="kpiMonth" class="kpi-big">0 / 0</div><div class="muted">За месяц</div></div>
      <div class="card kpi-box"><div id="streak" class="kpi-big">0</div><div class="muted">Серия выполнения</div></div>
      <div class="card kpi-chart">
        <header class="card-head">
          <span class="card-title">Выполнено по дням</span>
          <span class="muted">последние 7 дней</span>
        </header>
        <canvas id="bar7d" width="600" height="220" aria-label="Гистограмма 7 дней"></canvas>
      </div>
    </div>
  </main>

  <!-- Настройки -->
  <main id="settingsView" class="view" aria-label="Настройки">
    <h2 class="section-title">Настройки</h2>

    <div class="settings-group">
      <div class="row">
        <label for="accentColor">Акцентный цвет</label>
        <input type="color" id="accentColor" value="#5b6cff" />
      </div>
      <div class="row">
        <label for="neonToggle">Неон-эффект</label>
        <input type="checkbox" id="neonToggle" />
      </div>
      <div class="row">
        <label for="metalToggle">Металличность</label>
        <input type="checkbox" id="metalToggle" />
      </div>
      <div class="row">
        <label for="fontScale">Масштаб текста</label>
        <input type="range" id="fontScale" min="0.9" max="1.2" step="0.05" value="1" />
      </div>
    </div>

    <div class="settings-group">
      <div class="row">
        <label for="smartOptional">SMART-поля при добавлении</label>
        <input type="checkbox" id="smartOptional" checked />
      </div>
      <div class="row">
        <label for="slotStart">Старт дневной шкалы</label>
        <input type="time" id="slotStart" value="06:00" />
      </div>
      <div class="row">
        <label for="slotStep">Шаг слотов (мин)</label>
        <input type="number" id="slotStep" min="5" step="5" value="15" />
      </div>
    </div>
  </main>

  <!-- Плавающая кнопка добавления -->
  <button id="fab" class="fab" aria-label="Добавить">＋</button>

  <!-- Нижняя панель навигации -->
  <nav id="tabbar" class="tabbar" aria-label="Навигация">
    <button data-view="today" class="tab active" aria-label="Список">
      <span class="ico">🗂️</span>
    </button>
    <button data-view="calendar" class="tab" aria-label="Календарь">
      <span class="ico">📅</span>
    </button>
    <button data-view="stats" class="tab" aria-label="Статистика">
      <span class="ico">📊</span>
    </button>
    <button data-view="settings" class="tab" aria-label="Настройки">
      <span class="ico">⚙️</span>
    </button>
  </nav>

  <!-- Скрипт приложения: defer и ОДИН раз -->
  <script defer src="app.js?v=1.6.3"></script>
</body>
</html>
